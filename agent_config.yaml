agent_id: "agent-001"
agent_name: "Azure LangGraph Agent"
deployment: "azure"

llm:
  provider: "gemini"  # azure | gemini | ibm – swap here to change the LLM backend
instructions: |
  You are a helpful AI assistant. Use the available tools to answer user questions accurately.
  When performing calculations or fetching data, always use the appropriate tool.
agent_description: "A LangGraph-based agent with multi-server MCP tool support, deployed on Azure."
temperature: 0.7
top_p: 0.95

mcp:
  servers:
    - name: "local-mcp"
      description: "Local MCP server for development and testing"
      transport:
        type: "http"
        endpoint: "http://localhost:9000/mcp"
      authentication:
        type: "none"  # options: none | bearer | cert

metadata:
  owner: "team-ai"
  version: "0.1.0"
  created_at: "2026-03-11"
